  <div id="auto">
      <div id="container">
    <div id="fieldContainer">
      <div class="FuelCounter">
            <div class="Container">
                <div class="decrementBox">
                    <button type="button" class="decButton" onClick="decrementOneAuto()"><h1><strong>-1</strong></h1></button>
                    <button type="button" class="decButton" onClick="decrementThreeAuto()"><h1><strong>-3</strong></h1></button>
                    <button type="button" class="decButton" onClick="decrementTenAuto()"><h1><strong>-10</strong></h1></button>
                </div>
                
                <div class="inputBox">  
                    <h1>Auto Fuel</h1>
                    <div class="inputBox2">
                        <hr class="line"></hr>
                        <input 
                            class="autoFuelInput"
                            type="number"
                            id="autoFuelInput"
                            value=0
                            readOnly
                        />
                    </div>
                </div>
                <div class="incrementBox">
                    <button type="button" class="incButton" onClick="incrementOneAuto()"><h1><strong>+1</strong></h1></button>
                    <button type="button" class="incButton" onClick="incrementThreeAuto()"><h1><strong>+3</strong></h1></button>
                    <button type="button" class="incButton" onClick="incrementTenAuto()"><h2><strong>+10</strong></h2></button>
                </div>
          
            <br/>
            
        </div>
      </div>
      <div class="ClimbYesNo">
            <div class="radioGroup">
                <label>
                    <input
                        type="checkbox"
                        name="climbYesNo"
                        id="climbInput"
                    />
                    Climb
                </label>
            </div>
      </div>
      <img id="fieldImage">
    </div>
    
    <div id="gamePieceViewerContainer">
      <div id="gamePieceViewer">
        
        <h4 id="gamePieceViewerTitle">Game Piece Viewer</h4>
        <div id="gamePieceContainer"></div>
        
      </div>
      <h3 id="teamNum"></h3>
    </div>

  </div>

<script>

min = 0;
max = 99999;
let pieceTimer = null;
let flashInterval = null;
let autoValue = 0;

function setAutoValue(newValue) {
  autoValue = newValue;
  document.getElementById('autoFuelInput').value = autoValue;
  if(autoValue>0) {
    startPieceTimer();
  } else {
    stopPieceTimer();
  }
}
window.incrementOneAuto = () => { if (autoValue + 1 <= max) setAutoValue(autoValue + 1); };
  window.incrementThreeAuto = () => { if (autoValue + 3 <= max) setAutoValue(autoValue + 3); };
  window.incrementTenAuto = () => { if (autoValue + 10 <= max) setAutoValue(autoValue + 10); };

  window.decrementOneAuto = () => { if (autoValue - 1 >= min) setAutoValue(autoValue - 1); };
  window.decrementThreeAuto = () => { if (autoValue - 3 >= min) setAutoValue(autoValue - 3); };
  window.decrementTenAuto = () => { if (autoValue - 10 >= min) setAutoValue(autoValue - 10); };
function startPieceTimer(targetElementId) {

  // Start 15 second countdown
  if(pieceTimer){
    return; // Timer already running, do nothing
  }
  pieceTimer = setTimeout(() => {
    startFlashing(targetElementId);
  }, 15000); // 15000 ms = 15 seconds
}

function startFlashing() {
  const element = document.getElementById("autoFuelInput");
  if (!element) return;

  // If already flashing, don't stack intervals
  if (flashInterval) clearInterval(flashInterval);
  flashInterval = setInterval(() => {
    element.classList.toggle("flash-red");
  }, 500); // toggles every 0.5s
}

function stopPieceTimer() {
  // Stop timer if running
  if (pieceTimer) {
    clearTimeout(pieceTimer);
    pieceTimer = null;
  }

  // Stop flashing if running
  if (flashInterval) {
    clearInterval(flashInterval);
    flashInterval = null;

    // Remove flashing class in case it’s stuck red
    const flashing = document.querySelector(".flash-red");
    if (flashing) flashing.classList.remove("flash-red");
    document.body.style.backgroundColor = "#1a2d43";
  }
}
</script>
</div>

<script>

min = 0;
max = 99999;
let teleValue = 0;

function setTeleValue(newValue) {
  teleValue = newValue;
  document.getElementById('fuelInput').value = teleValue;
}
  window.incrementOneTeleop = () => { if (teleValue + 1 <= max) setTeleValue(teleValue + 1); };
  window.incrementThreeTeleop = () => { if (teleValue + 3 <= max) setTeleValue(teleValue + 3); };
  window.incrementTenTeleop = () => { if (teleValue + 10 <= max) setTeleValue(teleValue + 10); };

  window.decrementOneTeleop = () => { if (teleValue - 1 >= min) setTeleValue(teleValue - 1); };
  window.decrementThreeTeleop = () => { if (teleValue - 3 >= min) setTeleValue(teleValue - 3); };
  window.decrementTenTeleop = () => { if (teleValue - 10 >= min) setTeleValue(teleValue - 10); };

      <h3 class="inputLabel">Got defended: <div id="impactText" style="display: none;">Impact of defense: <output id="impactValue"></output>/10</div></h3>

        document.getElementById('impactText').style.display='none',
        document.getElementById('impactValue').textContent = null
      )">
